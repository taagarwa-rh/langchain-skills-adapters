name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Extract version from pyproject.toml
        id: version
        run: |
          VERSION=$(grep '^version' pyproject.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check if tag already exists
        id: tag_check
        run: |
          TAG="${{ steps.version.outputs.version }}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            # Tag exists — append build number
            BUILD=1
            while git rev-parse "${TAG}.${BUILD}" >/dev/null 2>&1; do
              BUILD=$((BUILD + 1))
            done
            echo "tag=${TAG}.${BUILD}" >> "$GITHUB_OUTPUT"
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "tag=$TAG" >> "$GITHUB_OUTPUT"
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build package
        run: uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Generate release notes from merge commits
        id: notes
        run: |
          TAG="${{ steps.tag_check.outputs.tag }}"
          # Find the previous tag
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            RANGE="${PREV_TAG}..HEAD"
          else
            RANGE="HEAD"
          fi
          # Collect commit list
          COMMITS=$(git log "$RANGE" --pretty=format:"- %s (%h)" --no-merges)
          {
            echo "notes<<NOTES_EOF"
            echo "## What's Changed"
            echo ""
            echo "$COMMITS"
            echo ""
            echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/${PREV_TAG:-$(git rev-list --max-parents=0 HEAD | head -1)}...${TAG}"
            echo "NOTES_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create tag and release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.tag_check.outputs.tag }}"
          git tag "$TAG"
          git push origin "$TAG"
          gh release create "$TAG" dist/* \
            --title "$TAG" \
            --notes "${{ steps.notes.outputs.notes }}"
